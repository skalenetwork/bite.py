name: Test Ubuntu 22

on:
  workflow_dispatch:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install requirements
        run: uv pip install -r requirements.txt

      - name: Setup OpenSSL 1.1.1 and build packages
        run: bash build_packages.sh

      - name: Verify libencrypt.so existence
        run: |
          echo "Checking for libencrypt.so..."
          find .venv -name "libencrypt.so" -exec ls -l {} \;
          find .venv -name "libencrypt.so" -exec ldd {} \; || true

      - name: Lint with ruff
        run: uv run ruff check . --exclude libBLS

      - name: Type check with mypy
        run: uv run mypy bite/

      - name: Run tests with coverage
        run: export LD_LIBRARY_PATH=$(pwd)/libs:$LD_LIBRARY_PATH && uv run --with pytest-cov pytest --cov=bite tests/ --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
