name: Build and publish

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to PyPI
        required: false
        default: false
        type: boolean
  push:
    branches: ["main", "develop"]
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: ubuntu-22
          - os: ubuntu-24.04
            artifact_name: ubuntu-24
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build distributions
        run: bash scripts/build_packages.sh

      - name: Validate distributions
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist-${{ matrix.artifact_name }}
          path: dist/*

  publish:
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download Ubuntu 22 distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist-ubuntu-22
          path: dist

      - name: Validate distributions
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
